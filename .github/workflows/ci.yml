name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.features || 'default' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""                                                          # default features
          - "--no-default-features"                                      # core only
          - "--all-features"                                             # all features
          - "--no-default-features --features runtime,store-memory,sandbox-local,llm-anthropic"
          - "--no-default-features --features runtime,store-memory,sandbox-local,llm-openai"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build (feature matrix)
        run: cargo build --workspace ${{ matrix.features }}

      - name: Test (feature matrix)
        run: cargo test --workspace ${{ matrix.features }}

      - name: Doc check
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for accurate coverage source path resolution

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: |
          cargo llvm-cov test --workspace --all-features --lcov --output-path lcov.info -- --nocapture
          curl -Os https://cli.codecov.io/latest/linux/codecov && chmod +x codecov
          ./codecov upload-file --file lcov.info
